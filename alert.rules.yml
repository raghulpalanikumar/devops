groups:
  - name: system-alerts
    rules:

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 5
        for: 1s
        labels:
          severity: critical
        annotations:
          summary: "High CPU Usage"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 5
        for: 1s
        labels:
          severity: critical
        annotations:
          summary: "High Memory Usage"